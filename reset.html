<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scout — Reset Password</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #faf9f6; color: #1a1a1a;
    }
    .card {
      text-align: center; padding: 48px 40px; max-width: 380px; width: 100%;
      background: #fff; border: 1px solid #e0ddd6;
      border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    h1 { font-size: 22px; font-weight: 700; margin: 0 0 8px; color: #111; }
    p { font-size: 14px; color: #666; margin: 0 0 20px; line-height: 1.6; }
    .error { font-size: 13px; color: #c0392b; margin-bottom: 12px; display: none; }
    input {
      width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #ddd;
      border-radius: 8px; margin-bottom: 10px; outline: none;
    }
    input:focus { border-color: #3d7a5a; }
    button {
      width: 100%; padding: 10px; font-size: 14px; font-weight: 600;
      background: #111; color: #fff; border: none; border-radius: 8px; cursor: pointer;
    }
    button:hover { background: #333; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .success { display: none; }
    .icon {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; background: rgba(61,122,90,0.1);
    }
    .hint { font-size: 12px; color: #999; margin-top: 16px; }
    .reqs { text-align: left; margin-bottom: 14px; font-size: 12px; color: #999; }
    .req.met { color: #3d7a5a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="form" id="formView">
      <h1>Reset your password</h1>
      <p>Enter a new password for your Scout account.</p>
      <div class="error" id="error"></div>
      <input type="password" id="password" placeholder="New password" />
      <input type="password" id="confirm" placeholder="Confirm password" />
      <div class="reqs" id="reqs">
        <div class="req" id="reqLen">&#9675; At least 6 characters</div>
        <div class="req" id="reqUpper">&#9675; One uppercase letter</div>
        <div class="req" id="reqNum">&#9675; One number</div>
        <div class="req" id="reqMatch">&#9675; Passwords match</div>
      </div>
      <button id="submitBtn" disabled>Update Password</button>
    </div>
    <div class="success" id="successView">
      <div class="icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M6 14l6 6L22 8" stroke="#3d7a5a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>Password updated!</h1>
      <p>You can now sign in to Scout with your new password.</p>
      <div class="hint">Close this tab and open Scout to sign in.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ssakemevsvdssiastsxq.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzYWtlbWV2c3Zkc3NpYXN0c3hxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNTY0NjEsImV4cCI6MjA4OTczMjQ2MX0.VI7fkgZYYgpatxl7wZa5kfezluqWQp9UEAQgEZmte3Y";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const pw = document.getElementById("password");
    const confirm = document.getElementById("confirm");
    const btn = document.getElementById("submitBtn");
    const error = document.getElementById("error");

    function check() {
      const p = pw.value;
      const c = confirm.value;
      const lenOk = p.length >= 6;
      const upperOk = /[A-Z]/.test(p);
      const numOk = /[0-9]/.test(p);
      const matchOk = p === c && p.length > 0;

      document.getElementById("reqLen").className = "req" + (lenOk ? " met" : "");
      document.getElementById("reqLen").innerHTML = (lenOk ? "&#10003;" : "&#9675;") + " At least 6 characters";
      document.getElementById("reqUpper").className = "req" + (upperOk ? " met" : "");
      document.getElementById("reqUpper").innerHTML = (upperOk ? "&#10003;" : "&#9675;") + " One uppercase letter";
      document.getElementById("reqNum").className = "req" + (numOk ? " met" : "");
      document.getElementById("reqNum").innerHTML = (numOk ? "&#10003;" : "&#9675;") + " One number";
      document.getElementById("reqMatch").className = "req" + (matchOk ? " met" : "");
      document.getElementById("reqMatch").innerHTML = (matchOk ? "&#10003;" : "&#9675;") + " Passwords match";

      btn.disabled = !(lenOk && upperOk && numOk && matchOk);
    }

    pw.addEventListener("input", check);
    confirm.addEventListener("input", check);

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      btn.textContent = "Updating...";
      error.style.display = "none";

      const { error: err } = await sb.auth.updateUser({ password: pw.value });
      if (err) {
        error.textContent = err.message;
        error.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Update Password";
      } else {
        document.getElementById("formView").style.display = "none";
        document.getElementById("successView").style.display = "block";
      }
    });

    // Check if we have a valid recovery session from the URL hash
    const hash = window.location.hash;
    if (!hash || !hash.includes("type=recovery")) {
      document.getElementById("formView").innerHTML = `
        <h1>Invalid link</h1>
        <p>This password reset link is invalid or has expired. Please request a new one from Scout.</p>
      `;
    }
  </script>
</body>
</html>
