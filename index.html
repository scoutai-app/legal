<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scout</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #faf9f6; color: #1a1a1a;
    }
    .card {
      text-align: center; padding: 48px 40px; max-width: 380px;
      background: #fff; border: 1px solid #e0ddd6;
      border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .icon {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .icon-success { background: rgba(61,122,90,0.1); }
    .icon-canceled { background: rgba(180,140,60,0.1); }
    h1 { font-size: 22px; font-weight: 700; margin: 0 0 8px; color: #111; }
    p { font-size: 14px; color: #666; margin: 0 0 24px; line-height: 1.6; }
    .hint { font-size: 12px; color: #999; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card" id="card"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const card = document.getElementById("card");

    if (params.has("upgraded")) {
      document.title = "Scout — Upgrade Successful";
      card.innerHTML = `
        <div class="icon icon-success">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <path d="M6 14l6 6L22 8" stroke="#3d7a5a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1>You're upgraded!</h1>
        <p>Your Scout plan is now active. Close this tab and reopen Scout to see your new limits.</p>
        <div class="hint">You can manage your subscription anytime from Scout settings.</div>
      `;
    } else if (params.has("canceled")) {
      document.title = "Scout — Checkout Canceled";
      card.innerHTML = `
        <div class="icon icon-canceled">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 8v4m0 4h.01" stroke="#b48c3c" stroke-width="2" stroke-linecap="round"/>
            <circle cx="12" cy="12" r="9" stroke="#b48c3c" stroke-width="2"/>
          </svg>
        </div>
        <h1>Checkout canceled</h1>
        <p>No charges were made. You can try upgrading again anytime from Scout settings.</p>
      `;
    } else {
      window.location.href = "terms.html";
    }
  </script>
</body>
</html>
